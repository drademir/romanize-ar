name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (rule-only, no camel-tools)
        run: |
          pip install fastapi==0.115.6 pydantic==2.10.3 httpx==0.28.1 pytest==8.3.4 ruff==0.8.4
      - name: Lint
        run: ruff check app tests
      - name: Test (rule-only path — camel-tools not installed)
        run: pytest -v tests/
